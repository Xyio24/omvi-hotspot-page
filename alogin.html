<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="2; url=$(link-redirect)">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logging in... - OMVI NET</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--color-bg); }
    .loader {
      border: 4px solid var(--glass-border);
      border-top: 4px solid var(--color-primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="text-center">
    <div class="loader"></div>
    <h3 style="color: var(--color-text);">Connecting you to the network...</h3>
    <p style="color: var(--color-text-muted);">Please wait a moment.</p>
  </div>
  <script language="JavaScript">
    <!--
    function startClock() {
      $(if popup == 'true')
      open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
      $(endif)
      location.href = '$(link-redirect)';
    }
    //-->
  </script>
</body>
<body onLoad="startClock()">
</body>
</html>
